<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Authentication</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 10px;
        }

        p {
            color: #666;
            margin-bottom: 30px;
        }

        #telegram-login-container {
            display: flex;
            justify-content: center;
            margin: 30px 0;
            min-height: 50px;
        }

        .status {
            color: #667eea;
            font-size: 14px;
            margin-top: 20px;
        }

        .success {
            color: #27ae60;
            font-size: 16px;
            font-weight: bold;
        }

        .error {
            color: #e74c3c;
            font-size: 14px;
            background: #fee;
            padding: 10px;
            border-radius: 8px;
            margin-top: 10px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Telegram Login</h1>
        <p>Click the button below to authenticate</p>
        <div id="telegram-login-container"></div>
        <div id="status" class="status">Loading...</div>
    </div>

    <script async src="https://telegram.org/js/telegram-widget.js?22" data-telegram-login="GebetaTrafficBot"
        data-size="large" data-radius="10" data-onauth="onTelegramAuth(user)" data-request-access="write">
        </script>

    <script>
        let authData = null;

        function onTelegramAuth(user) {
            console.log('Telegram auth received:', user);
            authData = user;

            document.getElementById('telegram-login-container').style.display = 'none';
            document.getElementById('status').textContent = 'Authentication successful! Processing...';
            document.getElementById('status').className = 'success';

            // Send data to React Native WebView immediately
            sendToApp(user);
        }

        function sendToApp(user) {
            try {
                if (window.ReactNativeWebView) {
                    console.log('Sending message to React Native');
                    const message = JSON.stringify({
                        type: 'telegram_auth',
                        data: user
                    });
                    console.log('Message:', message);
                    window.ReactNativeWebView.postMessage(message);

                    // Update status after sending
                    setTimeout(() => {
                        document.getElementById('status').textContent = 'Logging you in...';
                    }, 500);
                } else {
                    console.error('ReactNativeWebView not found');
                    document.getElementById('status').textContent = 'Error: Not in app WebView';
                    document.getElementById('status').className = 'error';
                }
            } catch (error) {
                console.error('Error sending message:', error);
                document.getElementById('status').textContent = 'Error: ' + error.message;
                document.getElementById('status').className = 'error';
            }
        }

        // Intercept ALL clicks and check if we have auth data
        document.addEventListener('click', function (e) {
            console.log('Click detected');
            // If we have auth data and user clicks anywhere, send it
            if (authData) {
                console.log('Auth data exists, sending to app');
                e.preventDefault();
                e.stopPropagation();
                sendToApp(authData);
                return false;
            }
        }, true);

        setTimeout(function () {
            const widget = document.querySelector('iframe');
            if (widget) {
                document.getElementById('status').textContent = '';
            }
        }, 2000);

        // Log when page loads
        console.log('Telegram WebView page loaded');
        console.log('ReactNativeWebView available:', !!window.ReactNativeWebView);
    </script>
</body>

</html>
