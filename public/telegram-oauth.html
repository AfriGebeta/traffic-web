<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Authentication</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 400px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #0088cc;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        h2 {
            color: #333;
            margin: 0 0 10px 0;
        }

        p {
            color: #666;
            margin: 0;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="spinner"></div>
        <h2>Redirecting to Telegram...</h2>
        <p>Please wait</p>
    </div>

    <script>
        // Check if we're receiving auth callback
        const hash = window.location.hash.substring(1);
        const params = new URLSearchParams(hash);

        const id = params.get('id');
        const auth_date = params.get('auth_date');
        const hashValue = params.get('hash');

        if (id && auth_date && hashValue) {
            // We have auth data, redirect to app
            document.querySelector('h2').textContent = 'Authentication Successful!';
            document.querySelector('p').textContent = 'Opening app...';

            const deepLinkParams = new URLSearchParams({
                id,
                auth_date,
                hash: hashValue,
                first_name: params.get('first_name') || '',
                last_name: params.get('last_name') || '',
                username: params.get('username') || '',
                photo_url: params.get('photo_url') || ''
            });

            const deepLink = `trafficapp://telegram-auth?${deepLinkParams.toString()}`;
            window.location.href = deepLink;
        } else {
            // No auth data, redirect to Telegram OAuth
            const botId = '8598127900';
            const origin = encodeURIComponent(window.location.origin);
            const returnUrl = encodeURIComponent(window.location.href);

            const oauthUrl = `https://oauth.telegram.org/auth?bot_id=${botId}&origin=${origin}&embed=1&request_access=write&return_to=${returnUrl}`;

            // Redirect to Telegram OAuth
            window.location.href = oauthUrl;
        }
    </script>
</body>

</html>
