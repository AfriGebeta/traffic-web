<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Login - GebetaMaps</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #da9f1f 0%, #da9f1f 100%);
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        h1 {
            color: #333;
            margin-bottom: 1rem;
        }

        p {
            color: #666;
            margin-bottom: 2rem;
        }

        #telegram-login-GebetaTrafficBot {
            display: inline-block;
        }

        .loading {
            display: none;
            margin-top: 1rem;
            color: #667eea;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1> GebetaMaps</h1>
        <p>Login with your Telegram account to continue</p>

        <script async src="https://telegram.org/js/telegram-widget.js?22" data-telegram-login="GebetaTrafficBot"
            data-size="large" data-onauth="onTelegramAuth(user)" data-request-access="write">
            </script>

        <div class="loading" id="loading">
            <p>Redirecting to app...</p>
        </div>
    </div>

    <script>
        function onTelegramAuth(user) {
            // Show loading state
            document.getElementById('loading').style.display = 'block';

            // Create URL parameters from Telegram user data
            const params = new URLSearchParams({
                id: user.id.toString(),
                auth_date: user.auth_date.toString(),
                hash: user.hash,
                first_name: user.first_name
            });

            // Add optional fields if they exist
            if (user.username) {
                params.append('username', user.username);
            }
            if (user.last_name) {
                params.append('last_name', user.last_name);
            }
            if (user.photo_url) {
                params.append('photo_url', user.photo_url);
            }

            // Redirect to app with deep link
            const deepLink = `trafficapp://telegram-auth?${params.toString()}`;
            window.location.href = deepLink;

            // Fallback: if app doesn't open in 2 seconds, show message
            setTimeout(() => {
                alert('Please make sure GebetaMaps app is installed on your device.');
            }, 2000);
        }
    </script>
</body>

</html>
