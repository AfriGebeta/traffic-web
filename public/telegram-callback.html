<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        h2 {
            color: #333;
            margin: 0;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="spinner"></div>
        <h2>Redirecting to app...</h2>
    </div>

    <script>
        // Get URL parameters
        const urlParams = new URLSearchParams(window.location.search);

        // Build deep link URL
        const deepLinkParams = new URLSearchParams();
        for (const [key, value] of urlParams) {
            deepLinkParams.append(key, value);
        }

        const deepLink = `trafficapp://telegram-auth?${deepLinkParams.toString()}`;

        // Try to open the app
        window.location.href = deepLink;

        // Fallback: show message after 2 seconds
        setTimeout(() => {
            document.querySelector('.container').innerHTML = `
                <h2>Authentication Successful!</h2>
                <p>If the app didn't open automatically, please return to the app manually.</p>
                <a href="${deepLink}" style="color: #667eea; text-decoration: none; font-weight: bold;">
                    Click here to open the app
                </a>
            `;
        }, 2000);
    </script>
</body>

</html>
